name: Build and deploy APC worker to Azure Function App - insyt-apc-worker-prod-v2

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: insyt-apc-worker-prod-v2
  AZURE_FUNCTIONAPP_PACKAGE_PATH: workers/insyt_processing_worker
  PYTHON_VERSION: '3.9'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install worker dependencies
        run: |
          cd "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}"
          rm -rf .python_packages
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          python -c "from pathlib import Path; p=Path('.python_packages/lib/site-packages'); print('site-packages exists:', p.exists()); print('top-level entries:', len(list(p.iterdir())) if p.exists() else 0)"

      - name: Deploy APC Worker Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_INSYT_APC_WORKER_PROD_V2 }}
          scm-do-build-during-deployment: false
          enable-oryx-build: false
